# configs/oneshot_sr_1d.yaml
# One-shot diffusion SR baseline for 1D Burgers
# Maps 64-pt → 512-pt directly (no resolution hierarchy)
# Conditioned on previous 512-pt state + current 64-pt observation

# =============================================================================
# Data — reuses the same 1D Burgers dataset from data/
# =============================================================================
data:
  data_dir: "data"
  train_trajectories: 40
  val_trajectories: 5
  test_trajectories: 5
  coarse_resolution: 64
  target_resolution: 512

# =============================================================================
# Diffusion U-Net (one-shot, no resolution conditioning)
# =============================================================================
unet:
  in_channels: 3  # [u_noisy, u_prev_512, u_obs_64_upsampled_to_512]
  base_channels: 64
  channel_mults: [1, 2, 4]  # -> 64, 128, 256
  n_res_blocks: 1
  use_attention: false
  group_norm_groups: 8
  cond_embed_dim: 128

diffusion:
  T: 1000
  schedule: "cosine"

diffusion_training:
  steps: 150000
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 2000
  ema_decay: 0.9999
  log_interval: 500
  save_interval: 25000
  val_interval: 5000

# =============================================================================
# Inference — MUST match iterative refinement settings exactly
# =============================================================================
inference:
  ddim_steps: 25
  eta: 0.0
  test_time_steps: 200

# =============================================================================
# Paths (separate from everything else)
# =============================================================================
paths:
  checkpoint_dir: "checkpoints_oneshot_1d"
  results_dir: "results_oneshot_1d"
  plots_dir: "plots_oneshot_1d"

seed: 42
device: "auto"
